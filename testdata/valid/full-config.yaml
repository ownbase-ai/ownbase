schema_version: v1

core:
  forgejo:
    domain: git.example.com
  caddy:
    email: admin@example.com

services:
  auth:
    source: services/auth
    mode: managed
    ref: v2.1.0
    port: 8080

  jobs:
    source: services/jobs
    mode: pinned
    ref: v1.4.2
    port: 3000
    dockerfile: Dockerfile.prod

  storage:
    source: services/storage
    mode: pinned
    ref: RELEASE.2024-01-01T00-00-00Z
    port: 9000

  postgres:
    mirror: https://github.com/docker-library/postgres
    mode: managed
    context: "17/alpine"
    port: 5432

  crm:
    source: apps/crm
    domain: crm.example.ownbase.ai
    port: 8080
    database: crm_db
    requires:
      - auth
      - jobs
      - postgres

  dashboard:
    source: apps/dashboard
    domain: dashboard.example.ownbase.ai
    port: 3000
    requires:
      - auth
