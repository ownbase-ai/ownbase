schema_version: v1

services:
  auth:
    repo: https://github.com/example/auth.git
    mode: managed
    ref: v2.1.0
    port: 8080

  postgres:
    repo: https://github.com/example/postgres.git
    mode: managed

  crm:
    repo: https://github.com/example/crm.git
    domain: crm.example.ownbase.ai
    port: 8080
    database: crm_db
    requires:
      - auth
      - postgres

  worker:
    repo: https://github.com/example/worker.git
    requires:
      - postgres

  # Two service instances from the same monorepo, different Dockerfiles.
  api:
    repo: https://github.com/example/platform.git
    context: services/api
    dockerfile: Dockerfile.prod
    port: 8080

  api-worker:
    repo: https://github.com/example/platform.git
    context: services/worker
    dockerfile: Dockerfile.worker
