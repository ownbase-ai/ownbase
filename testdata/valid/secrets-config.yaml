schema_version: v1

services:
  auth:
    source: services/auth
    mode: managed
    ref: v2.1.0
    port: 8080

  postgres:
    source: services/postgres
    mode: managed

  crm:
    source: apps/crm
    domain: crm.example.ownbase.ai
    port: 8080
    database: crm_db
    requires:
      - auth
      - postgres

  worker:
    source: apps/worker
    requires:
      - postgres

  # Two service instances from the same monorepo, different Dockerfiles.
  api:
    source: apps/platform
    context: services/api
    dockerfile: Dockerfile.prod
    port: 8080

  api-worker:
    source: apps/platform
    context: services/worker
    dockerfile: Dockerfile.worker
