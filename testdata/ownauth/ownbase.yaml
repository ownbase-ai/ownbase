schema_version: v1

# OwnAuth integration proof (M9).
# OwnAuth is built from the upstream anonlogin repo at a pinned ref.
# Postgres is built from docker-library/postgres.
# No application image is pulled from a registry.

services:
  postgres:
    repo: https://github.com/docker-library/postgres
    mode: pinned
    ref: "17-alpine"
    context: "17/alpine"
    port: 5432

  auth:
    repo: https://github.com/anonlogin/anonlogin.git
    mode: managed
    ref: v1.0.0
    port: 8080
    requires:
      - postgres

  app:
    repo: https://github.com/example/hello.git
    domain: app.example.com
    port: 3000
    requires:
      - auth                     # depends on the capability, not the implementation
